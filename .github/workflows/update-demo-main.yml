## Updates demo site (https://github.com/zetxek/adritian-demo)
## taken from https://stackoverflow.com/a/68213855/570087

name: Update demo site (on main update)
on:
  push:
    ## run on push to main or a new semantic tag (ie: v1.2.3)
    branches: 
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '>=1.20.0'

      - name: Clone demo repository
        run: |
          LATEST_TAG=$(git describe --tags --always)  
          LATEST_COMMIT=$(git rev-parse HEAD)
          REPOSITORY="zetxek/adritian-demo"
          FOLDER="bin/$REPOSITORY"
          BRANCH_NAME="theme-update/update-theme-to-$LATEST_TAG"
          BASE_BRANCH="main"
          ASSIGNEE="zetxek"

          echo "Latest tag: $LATEST_TAG"
          echo "Latest commit: $LATEST_COMMIT"

          # Clone the remote repository
          git clone \
            --depth=1 \
            --branch=main \
            https://some-user:${{ secrets.PRIVATE_TOKEN_GITHUB }}@github.com/$REPOSITORY \
            $FOLDER

          cd $FOLDER

          # Setup the committers identity
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions - update theme module"
          git config pull.rebase false
          git config --global --add --bool push.autoSetupRemote true

          # Create a new feature branch for the changes
          git checkout -b $BRANCH_NAME

          # Initialize Hugo module if not already initialized
          if [ ! -f "go.mod" ]; then
            hugo mod init github.com/$REPOSITORY
          fi

          # Update the theme module to latest version
          echo "Updating theme to $LATEST_TAG..."
          hugo mod get -u github.com/zetxek/adritian-free-hugo-theme@$LATEST_TAG
          hugo mod tidy
          
          # Commit the changes
          echo "🔄 Adding all changes - updating theme to $LATEST_TAG"
          git add go.mod go.sum hugo.toml
          
          COMMIT_MSG="chore: update theme module to $LATEST_TAG"
          git commit -am "$COMMIT_MSG" || echo "No changes to commit"

          echo "Pushing branch: $BRANCH_NAME"
          git push origin $BRANCH_NAME --force

          # Create pull request
          echo "${{ secrets.PRIVATE_TOKEN_GITHUB }}" > token.txt
          gh auth login --with-token < token.txt

          echo "Creating pull-request..."
          PR_TITLE="chore: update theme to $LATEST_TAG"
          PR_BODY="🤖 This automated PR updates the theme module to version $LATEST_TAG.
          
          Changes from: https://github.com/zetxek/adritian-free-hugo-theme/commit/$LATEST_COMMIT
          🔗 Triggered by https://github.com/zetxek/adritian-free-hugo-theme/actions/workflows/update-demo-pr.yml"

          gh pr create \
            --title "$PR_TITLE" \
            --body "$PR_BODY" \
            --head $BRANCH_NAME \
            --base $BASE_BRANCH \
            --assignee $ASSIGNEE

          echo "✅ Pull-request created - done!"